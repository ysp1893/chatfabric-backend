server:
  port: 8080

spring:
  application:
    name: chatfabric-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chatfabric}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms
  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    com.chatfabric.chat: DEBUG

app:
  presence:
    store: ${PRESENCE_STORE:in-memory}
  security:
    jwt:
      secret: ${JWT_SECRET:chatfabric-super-secret-jwt-key-change-me-2026}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:900}
