server:
  port: ${PORT:8080}

spring:
  application:
    name: chatfabric-backend

  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:chatfabric}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  redis:
    host: ${REDISHOST:localhost}
    port: ${REDISPORT:6379}
    password: ${REDISPASSWORD:}
    timeout: 2000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    com.chatfabric.chat: INFO

app:
  presence:
    store: ${PRESENCE_STORE:in-memory}

  e2ee:
    required: ${E2EE_REQUIRED:true}

  security:
    require-ssl: ${REQUIRE_SSL:false}
    allowed-origins: ${ALLOWED_ORIGINS:*}

    jwt:
      secret: ${JWT_SECRET:change-this-secret-in-prod}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:900}

    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:120}
      excluded-paths:
        - /api/auth/login
        - /api/users/register